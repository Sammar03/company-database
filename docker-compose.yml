# Local full-stack test: backend + pgvector, using real keys from backend/.env.
# `docker compose up -d --build` → both containers show up in Docker Desktop.
# Mirrors production except the DB is a local pgvector instead of Neon.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: company-db
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: company-backend
    env_file:
      - ./backend/.env # GEMINI_API_KEY, GROQ_API_KEY (DATABASE_URL/CORS overridden below)
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      CORS_ORIGINS: http://localhost:5173
      # ADMIN_KEY comes from backend/.env (gitignored). Empty = delete open locally.
      # Never hardcode a real admin key here — this file is committed.
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
